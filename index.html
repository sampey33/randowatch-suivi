<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RandoWatch - Suivi en direct</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        #header { background: #16213e; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #0f3460; flex-shrink: 0; }
        #header h1 { font-size: 16px; color: #4CAF50; }
        #status { display: flex; align-items: center; gap: 8px; font-size: 13px; }
        #btnSound { background: #333; border: 1px solid #555; color: #aaa; border-radius: 20px; padding: 4px 10px; font-size: 12px; cursor: pointer; margin-left: 8px; }
        #btnSound.on { background: #1a3a22; border-color: #4CAF50; color: #4CAF50; }
        #statusDot { width: 10px; height: 10px; border-radius: 50%; background: #888; }
        #statusDot.active { background: #4CAF50; animation: pulse 1.5s infinite; }
        #statusDot.inactive { background: #FF4444; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

        #tabs { display: flex; background: #16213e; border-bottom: 1px solid #0f3460; flex-shrink: 0; }
        .tab-btn { flex: 1; padding: 10px; background: none; border: none; color: #aaa; cursor: pointer; font-size: 13px; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: #4CAF50; border-bottom-color: #4CAF50; }

        #panel-live, #panel-history { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        #panel-live.active, #panel-history.active { display: flex; }

        #map { flex: 1; }
        #infoBar { background: #16213e; padding: 8px 20px; display: flex; gap: 20px; font-size: 13px; border-top: 1px solid #0f3460; flex-shrink: 0; }
        #infoBar span { color: #aaa; }
        #infoBar strong { color: #fff; }
        #bpmChart-container { background: #16213e; padding: 8px 16px; height: 90px; flex-shrink: 0; border-top: 1px solid #0f3460; }

        #panel-history { flex-direction: row; }
        #session-list { width: 210px; background: #16213e; border-right: 1px solid #0f3460; overflow-y: auto; flex-shrink: 0; }
        #session-list h2 { padding: 12px 16px 6px; font-size: 13px; color: #aaa; border-bottom: none; }
        #btnDeleteAll { width: calc(100% - 32px); margin: 6px 16px 8px; padding: 6px; background: #f85149; border: none; color: #fff; border-radius: 6px; cursor: pointer; font-size: 11px; border-bottom: 1px solid #0f3460; }
        #btnDeleteAll:hover { background: #c0392b; }
        .session-item { padding: 10px 16px; border-bottom: 1px solid #0f3460; cursor: pointer; transition: background 0.2s; }
        .session-item:hover { background: #1c2a45; }
        .session-item.selected { background: #1a3a22; border-left: 3px solid #4CAF50; }
        .session-date { font-size: 12px; color: #4CAF50; font-weight: bold; }
        .session-info { font-size: 11px; color: #aaa; margin-top: 3px; }
        .session-delete { float: right; background: #f85149; border: none; color: #fff; border-radius: 4px; padding: 2px 8px; cursor: pointer; font-size: 11px; }
        .session-delete:hover { background: #c0392b; }
        #no-sessions { padding: 20px 16px; color: #666; font-size: 12px; }

        #history-detail { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #history-placeholder { flex: 1; display: flex; align-items: center; justify-content: center; color: #555; font-size: 14px; }
        #history-map { flex: 1; display: none; }
        #history-infoBar { display: none; background: #16213e; padding: 8px 16px; gap: 20px; font-size: 12px; border-top: 1px solid #0f3460; flex-shrink: 0; flex-wrap: wrap; }
        #history-infoBar span { color: #aaa; }
        #history-infoBar strong { color: #fff; }
        #history-bpm-container { display: none; background: #16213e; padding: 6px 16px 4px; height: 90px; flex-shrink: 0; border-top: 1px solid #0f3460; position: relative; cursor: crosshair; }
        #history-bpm-container .bpm-hint { position: absolute; top: 4px; right: 12px; font-size: 9px; color: #555; }
        #click-info { position: absolute; top: 4px; left: 12px; font-size: 10px; color: #4CAF50; }

        /* SOS OVERLAY */
        #sosOverlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        #sosOverlay.active { display: flex; }
        #sosOverlay.sos-mode { animation: sosBlink 0.8s infinite; }
        #sosOverlay.bpm-mode { animation: bpmBlink 0.8s infinite; }
        @keyframes sosBlink { 0%,100% { background: #cc0000; } 50% { background: #ff0000; } }
        @keyframes bpmBlink { 0%,100% { background: #cc6600; } 50% { background: #ff8800; } }

        #sosTitle { font-size: 48px; font-weight: bold; color: #fff; text-shadow: 0 0 20px rgba(0,0,0,0.5); margin-bottom: 8px; animation: sosPulse 0.8s infinite; }
        @keyframes sosPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        #sosSubtitle { font-size: 18px; color: #ffcccc; margin-bottom: 16px; text-align: center; padding: 0 20px; }
        #sosTime { font-size: 13px; color: #ffaaaa; margin-bottom: 6px; }
        #sosCoords { font-size: 13px; color: #ffdddd; margin-bottom: 16px; }

        /* Carte SOS normale */
        #sosMapContainer { width: 300px; height: 200px; border-radius: 12px; overflow: hidden; border: 3px solid #fff; margin-bottom: 16px; cursor: pointer; position: relative; transition: all 0.3s; }
        #sosMapContainer:hover::after { content: '🔍 Agrandir'; position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.7); color: #fff; font-size: 11px; padding: 4px 8px; border-radius: 4px; }
        #sosMap { width: 100%; height: 100%; }

        /* Carte SOS agrandie */
        #sosMapBig { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 10000; flex-direction: column; background: #000; }
        #sosMapBig.active { display: flex; }
        #sosMapBigHeader { background: #cc0000; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        #sosMapBigHeader span { font-size: 14px; font-weight: bold; }
        #btnCloseBigMap { background: #fff; color: #cc0000; border: none; padding: 6px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 13px; }
        #sosMapFull { flex: 1; }

        #btnCancelSos { background: #fff; color: #cc0000; border: none; padding: 14px 40px; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 20px rgba(0,0,0,0.3); margin-top: 8px; }
        #btnCancelSos:hover { background: #ffeeee; }
    </style>
</head>
<body>

<!-- SOS OVERLAY -->
<div id="sosOverlay">
    <div id="sosTitle">🆘 SOS 🆘</div>
    <div id="sosSubtitle">Le porteur a besoin de secours !</div>
    <div id="sosTime"></div>
    <div id="sosCoords"></div>
    <div id="sosMapContainer" onclick="openBigMap()">
        <div id="sosMap"></div>
    </div>
    <button id="btnCancelSos">✅ Annuler l'alerte</button>
</div>

<!-- CARTE SOS AGRANDIE -->
<div id="sosMapBig">
    <div id="sosMapBigHeader">
        <span>🆘 Position du porteur</span>
        <button id="btnCloseBigMap" onclick="closeBigMap()">✕ Fermer</button>
    </div>
    <div id="sosMapFull"></div>
</div>

<div id="header">
    <h1>🥾 RandoWatch</h1>
    <div id="status">
        <div id="statusDot"></div>
        <span id="statusText"></span>
    </div>
    <button id="btnSound" onclick="toggleSound()">🔇 Son</button>
</div>

<div id="tabs">
    <button class="tab-btn active" onclick="showTab('live')">📍 En direct</button>
    <button class="tab-btn" onclick="showTab('history')">📋 Historique</button>
</div>

<div id="panel-live" class="active">
    <div id="map"></div>
    <div id="infoBar">
        <div><span>Lat : </span><strong id="lat">--</strong></div>
        <div><span>Lon : </span><strong id="lon">--</strong></div>
        <div><span>❤️ </span><strong id="hr">--</strong></div>
        <div><span id="lastUpdate"></span></div>
    </div>
    <div id="bpmChart-container">
        <canvas id="bpmChart"></canvas>
    </div>
</div>

<div id="panel-history">
    <div id="session-list">
        <h2>Sessions</h2>
        <button id="btnDeleteAll">🗑 Supprimer tout</button>
        <div id="no-sessions">Aucune session</div>
    </div>
    <div id="history-detail">
        <div id="history-placeholder">← Sélectionne une session</div>
        <div id="history-map"></div>
        <div id="history-infoBar">
            <div><span>Durée : </span><strong id="h-duration">--</strong></div>
            <div><span>Points : </span><strong id="h-points">--</strong></div>
            <div><span>❤️ moy : </span><strong id="h-hr-avg">--</strong></div>
            <div><span>❤️ max : </span><strong id="h-hr-max">--</strong></div>
        </div>
        <div id="history-bpm-container">
            <span class="bpm-hint">Cliquer sur la courbe pour localiser</span>
            <span id="click-info"></span>
            <canvas id="historyBpmChart"></canvas>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getDatabase, ref, onValue, remove, get, set } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDsi0WLkIKL1lp8WSxwVYTV4ONldZMOLH8",
        authDomain: "randowatch-541ef.firebaseapp.com",
        databaseURL: "https://randowatch-541ef-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "randowatch-541ef",
        storageBucket: "randowatch-541ef.firebasestorage.app",
        messagingSenderId: "713345057483",
        appId: "1:713345057483:web:8d3365c00888cd047d514e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // AUDIO
    let audioCtx = null;
    let sosAlarm = null;
    let bpmAlertActive = false;
    let soundEnabled = false;

    window.toggleSound = function() {
        if (!soundEnabled) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            // Bip de confirmation
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            gain.gain.value = 0.2;
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
            soundEnabled = true;
            document.getElementById('btnSound').textContent = '🔊 Son';
            document.getElementById('btnSound').classList.add('on');
        } else {
            stopAlarm();
            soundEnabled = false;
            document.getElementById('btnSound').textContent = '🔇 Son';
            document.getElementById('btnSound').classList.remove('on');
        }
    };

    function startAlarm() {
        if (!soundEnabled || !audioCtx) return;
        function beep() {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = 880;
                gain.gain.value = 0.5;
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } catch(e) {}
        }
        beep();
        sosAlarm = setInterval(beep, 800);
    }

    function stopAlarm() {
        if (sosAlarm) { clearInterval(sosAlarm); sosAlarm = null; }
    }

    // TABS
    window.showTab = function(tab) {
        document.querySelectorAll('.tab-btn').forEach((b, i) => {
            b.classList.toggle('active', (i === 0 && tab === 'live') || (i === 1 && tab === 'history'));
        });
        document.getElementById('panel-live').classList.toggle('active', tab === 'live');
        document.getElementById('panel-history').classList.toggle('active', tab === 'history');
        if (tab === 'live') setTimeout(() => liveMap.invalidateSize(), 100);
        if (tab === 'history') { loadSessions(); if (historyMap) setTimeout(() => historyMap.invalidateSize(), 100); }
    };

    // LIVE MAP
    const liveMap = L.map('map').setView([44.3, 2.7], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(liveMap);
    const liveIcon = L.divIcon({
        html: `<div style="width:14px;height:14px;background:#4CAF50;border:3px solid #fff;border-radius:50%;box-shadow:0 0 8px rgba(76,175,80,0.8)"></div>`,
        iconSize: [14, 14], iconAnchor: [7, 7], className: ''
    });
    let liveMarker = null;
    let livePolyline = L.polyline([], { color: '#4CAF50', weight: 3 }).addTo(liveMap);
    let livePoints = [];

    // LIVE BPM CHART
    const bpmChart = new Chart(document.getElementById('bpmChart').getContext('2d'), {
        type: 'line',
        data: { labels: [], datasets: [{ data: [], borderColor: '#f85149', backgroundColor: 'rgba(248,81,73,0.1)', borderWidth: 1.5, pointRadius: 0, tension: 0.3 }] },
        options: {
            responsive: true, maintainAspectRatio: false, animation: false,
            plugins: { legend: { display: false } },
            scales: {
                x: { ticks: { color: '#555', maxTicksLimit: 5, font: { size: 9 } }, grid: { color: '#222' } },
                y: { ticks: { color: '#aaa', font: { size: 9 } }, grid: { color: '#222' }, min: 40 }
            }
        }
    });

    // SOS MAPS
    let sosMap = null;
    let sosMarker = null;
    let sosMapFull = null;
    let sosMarkerFull = null;
    let lastSosLat = null;
    let lastSosLon = null;

    window.openBigMap = function() {
        if (!lastSosLat) return;
        document.getElementById('sosMapBig').classList.add('active');
        if (!sosMapFull) {
            sosMapFull = L.map('sosMapFull').setView([lastSosLat, lastSosLon], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(sosMapFull);
        }
        setTimeout(() => sosMapFull.invalidateSize(), 100);
        sosMapFull.setView([lastSosLat, lastSosLon], 15);
        const sosIconFull = L.divIcon({
            html: `<div style="width:24px;height:24px;background:#ff0000;border:3px solid #fff;border-radius:50%;box-shadow:0 0 16px rgba(255,0,0,0.9)"></div>`,
            iconSize: [24, 24], iconAnchor: [12, 12], className: ''
        });
        if (sosMarkerFull) sosMapFull.removeLayer(sosMarkerFull);
        sosMarkerFull = L.marker([lastSosLat, lastSosLon], { icon: sosIconFull }).addTo(sosMapFull);
    };

    window.closeBigMap = function() {
        document.getElementById('sosMapBig').classList.remove('active');
    };

    function showSos(data) {
        lastSosLat = data.lat;
        lastSosLon = data.lon;
        const overlay = document.getElementById('sosOverlay');
        overlay.className = 'active sos-mode';
        document.getElementById('sosTitle').textContent = '🆘 SOS 🆘';
        document.getElementById('sosSubtitle').textContent = 'Le porteur a besoin de secours !';
        document.getElementById('sosTime').textContent = `⏱ ${new Date(data.timestamp).toLocaleTimeString('fr-FR')}`;
        document.getElementById('sosCoords').textContent = `📍 ${data.lat.toFixed(5)}, ${data.lon.toFixed(5)}`;
        document.getElementById('sosMapContainer').style.display = 'block';

        if (!sosMap) {
            sosMap = L.map('sosMap', { zoomControl: false, attributionControl: false }).setView([data.lat, data.lon], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(sosMap);
        }
        setTimeout(() => sosMap.invalidateSize(), 100);
        sosMap.setView([data.lat, data.lon], 15);
        const sosIcon = L.divIcon({
            html: `<div style="width:20px;height:20px;background:#ff0000;border:3px solid #fff;border-radius:50%;box-shadow:0 0 12px rgba(255,0,0,0.8)"></div>`,
            iconSize: [20, 20], iconAnchor: [10, 10], className: ''
        });
        if (sosMarker) sosMap.removeLayer(sosMarker);
        sosMarker = L.marker([data.lat, data.lon], { icon: sosIcon }).addTo(sosMap);
        startAlarm();
    }

    function showBpmAlert(hr, lat, lon) {
        if (bpmAlertActive) return;
        bpmAlertActive = true;
        const overlay = document.getElementById('sosOverlay');
        overlay.className = 'active bpm-mode';
        document.getElementById('sosTitle').textContent = '⚠️ BPM CRITIQUE ⚠️';
        document.getElementById('sosSubtitle').textContent = `Fréquence cardiaque anormale : ${hr} bpm`;
        document.getElementById('sosTime').textContent = `⏱ ${new Date().toLocaleTimeString('fr-FR')}`;
        document.getElementById('sosCoords').textContent = lat && lon ? `📍 ${lat.toFixed(5)}, ${lon.toFixed(5)}` : '';
        document.getElementById('sosMapContainer').style.display = 'none';
        startAlarm();
    }

    function hideSos() {
        document.getElementById('sosOverlay').className = '';
        document.getElementById('sosMapBig').classList.remove('active');
        document.getElementById('sosTitle').textContent = '🆘 SOS 🆘';
        document.getElementById('sosSubtitle').textContent = 'Le porteur a besoin de secours !';
        document.getElementById('sosMapContainer').style.display = 'block';
        bpmAlertActive = false;
        lastSosLat = null;
        lastSosLon = null;
        stopAlarm();
    }

    // FIREBASE SOS
    onValue(ref(db, 'sos'), (snapshot) => {
        const data = snapshot.val();
        if (data && data.active === true) showSos(data);
        else if (!bpmAlertActive) hideSos();
    });

    document.getElementById('btnCancelSos').addEventListener('click', async () => {
        await set(ref(db, 'sos'), { active: false });
        hideSos();
    });

    // FIREBASE LIVE
    onValue(ref(db, 'position'), (snapshot) => {
        const data = snapshot.val();
        if (!data) {
            document.getElementById('statusDot').className = 'inactive';
            document.getElementById('statusText').textContent = 'Suivi inactif';
            document.getElementById('statusText').style.color = '#FF4444';
            return;
        }
        const { lat, lon, timestamp: ts, heartRate: hr } = data;
        lastTimestamp = ts;
        if (!liveMarker) {
            liveMarker = L.marker([lat, lon], { icon: liveIcon }).addTo(liveMap);
            liveMap.setView([lat, lon], 15);
        } else { liveMarker.setLatLng([lat, lon]); liveMap.panTo([lat, lon]); }
        livePoints.push([lat, lon]);
        livePolyline.setLatLngs(livePoints);
        document.getElementById('lat').textContent = lat.toFixed(5);
        document.getElementById('lon').textContent = lon.toFixed(5);
        document.getElementById('hr').textContent = hr ? `${hr} bpm` : '--';
        document.getElementById('statusDot').className = 'active';
        document.getElementById('statusText').textContent = 'En direct';
        document.getElementById('statusText').style.color = '#4CAF50';
        const date = new Date(ts);
        document.getElementById('lastUpdate').textContent = `MAJ : ${date.toLocaleTimeString('fr-FR')}`;
        if (hr && hr > 0) {
            bpmChart.data.labels.push(date.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }));
            bpmChart.data.datasets[0].data.push(hr);
            if (bpmChart.data.labels.length > 60) { bpmChart.data.labels.shift(); bpmChart.data.datasets[0].data.shift(); }
            bpmChart.update();
            if (hr < 20) showBpmAlert(hr, lat, lon);
        }
    });

    // HISTORY
    let historyMap = null;
    let historyBpmChart = null;
    let clickMarker = null;
    let currentPoints = [];
    let lastTimestamp = null;

    // Vérifier toutes les 10 secondes si les données sont obsolètes
    setInterval(() => {
        if (!lastTimestamp) return;
        const age = Date.now() - lastTimestamp;
        if (age > 30000) {
            showBpmAlert(0, null, null);
        }
    }, 10000);

    document.getElementById('btnDeleteAll').addEventListener('click', async () => {
        if (confirm('Supprimer toutes les sessions ?')) {
            await remove(ref(db, 'historique'));
            loadSessions();
            resetDetail();
        }
    });

    async function loadSessions() {
        const snap = await get(ref(db, 'historique'));
        const container = document.getElementById('session-list');
        container.querySelectorAll('.session-item').forEach(e => e.remove());
        const noSessions = document.getElementById('no-sessions');
        if (!snap.exists()) { noSessions.style.display = 'block'; return; }
        noSessions.style.display = 'none';

        const sessions = snap.val();
        Object.keys(sessions).sort().reverse().forEach(sessionId => {
            const points = Object.values(sessions[sessionId]).sort((a, b) => a.timestamp - b.timestamp);
            const date = new Date(points[0].timestamp);
            const dateStr = date.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric' });
            const timeStr = date.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
            const hrValues = points.map(p => p.heartRate).filter(h => h && h > 0);
            const hrAvg = hrValues.length ? Math.round(hrValues.reduce((a, b) => a + b, 0) / hrValues.length) : '--';

            const item = document.createElement('div');
            item.className = 'session-item';
            item.innerHTML = `
                <button class="session-delete">✕</button>
                <div class="session-date">${dateStr} ${timeStr}</div>
                <div class="session-info">${points.length} pts · ❤️ ${hrAvg} bpm</div>
            `;
            item.querySelector('.session-delete').addEventListener('click', async (e) => {
                e.stopPropagation();
                if (confirm('Supprimer cette session ?')) {
                    await remove(ref(db, `historique/${sessionId}`));
                    loadSessions();
                    resetDetail();
                }
            });
            item.addEventListener('click', () => showSession(points, item));
            container.appendChild(item);
        });
    }

    function resetDetail() {
        document.getElementById('history-placeholder').style.display = 'flex';
        document.getElementById('history-map').style.display = 'none';
        document.getElementById('history-infoBar').style.display = 'none';
        document.getElementById('history-bpm-container').style.display = 'none';
    }

    function showSession(points, item) {
        document.querySelectorAll('.session-item').forEach(e => e.classList.remove('selected'));
        item.classList.add('selected');
        currentPoints = points;

        document.getElementById('history-placeholder').style.display = 'none';
        document.getElementById('history-map').style.display = 'block';
        document.getElementById('history-infoBar').style.display = 'flex';
        document.getElementById('history-bpm-container').style.display = 'block';

        if (!historyMap) {
            historyMap = L.map('history-map').setView([44.3, 2.7], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(historyMap);
        }
        historyMap.eachLayer(layer => { if (!(layer instanceof L.TileLayer)) historyMap.removeLayer(layer); });
        clickMarker = null;
        setTimeout(() => historyMap.invalidateSize(), 100);

        const latLngs = points.map(p => [p.lat, p.lon]);
        const poly = L.polyline(latLngs, { color: '#58a6ff', weight: 3 }).addTo(historyMap);
        if (latLngs.length > 0) historyMap.fitBounds(poly.getBounds(), { padding: [20, 20] });

        const startIcon = L.divIcon({ html: `<div style="background:#4CAF50;color:#fff;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold">D</div>`, iconSize: [18, 18], iconAnchor: [9, 9], className: '' });
        const endIcon = L.divIcon({ html: `<div style="background:#f85149;color:#fff;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold">A</div>`, iconSize: [18, 18], iconAnchor: [9, 9], className: '' });
        if (latLngs.length > 0) L.marker(latLngs[0], { icon: startIcon }).addTo(historyMap).bindPopup('Départ');
        if (latLngs.length > 1) L.marker(latLngs[latLngs.length - 1], { icon: endIcon }).addTo(historyMap).bindPopup('Arrivée');

        const hrValues = points.map(p => p.heartRate).filter(h => h && h > 0);
        document.getElementById('h-duration').textContent = points.length > 1 ? formatDuration(points[points.length - 1].timestamp - points[0].timestamp) : '--';
        document.getElementById('h-points').textContent = points.length;
        document.getElementById('h-hr-avg').textContent = hrValues.length ? `${Math.round(hrValues.reduce((a, b) => a + b, 0) / hrValues.length)} bpm` : '--';
        document.getElementById('h-hr-max').textContent = hrValues.length ? `${Math.max(...hrValues)} bpm` : '--';

        const hCtx = document.getElementById('historyBpmChart').getContext('2d');
        if (historyBpmChart) historyBpmChart.destroy();
        historyBpmChart = new Chart(hCtx, {
            type: 'line',
            data: {
                labels: points.map(p => new Date(p.timestamp).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })),
                datasets: [{ data: points.map(p => p.heartRate || null), borderColor: '#f85149', backgroundColor: 'rgba(248,81,73,0.15)', borderWidth: 1.5, pointRadius: 0, pointHoverRadius: 5, tension: 0.3, spanGaps: true, fill: true }]
            },
            options: {
                responsive: true, maintainAspectRatio: false, animation: false,
                plugins: { legend: { display: false }, tooltip: { enabled: false } },
                scales: {
                    x: { ticks: { color: '#555', maxTicksLimit: 6, font: { size: 9 } }, grid: { color: '#222' } },
                    y: { ticks: { color: '#aaa', font: { size: 9 } }, grid: { color: '#222' }, min: 40 }
                },
                onClick: (event) => {
                    const els = historyBpmChart.getElementsAtEventForMode(event, 'index', { intersect: false }, false);
                    if (!els.length) return;
                    const idx = els[0].index;
                    const pt = currentPoints[idx];
                    if (!pt || !pt.lat) return;
                    if (clickMarker) historyMap.removeLayer(clickMarker);
                    const clickIcon = L.divIcon({ html: `<div style="background:#FFDD44;border:2px solid #000;border-radius:50%;width:14px;height:14px;"></div>`, iconSize: [14, 14], iconAnchor: [7, 7], className: '' });
                    clickMarker = L.marker([pt.lat, pt.lon], { icon: clickIcon }).addTo(historyMap);
                    historyMap.panTo([pt.lat, pt.lon]);
                    document.getElementById('click-info').textContent = `📍 ${new Date(pt.timestamp).toLocaleTimeString('fr-FR')} · ❤️ ${pt.heartRate ? pt.heartRate + ' bpm' : '--'}`;
                }
            }
        });
    }

    function formatDuration(ms) {
        const s = Math.floor(ms / 1000);
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        return h > 0 ? `${h}h${String(m).padStart(2, '0')}` : `${m} min`;
    }
</script>

</body>
